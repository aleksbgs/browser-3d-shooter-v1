services:
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "${COLYSEUS_PORT:-2567}:${COLYSEUS_PORT:-2567}"
    environment:
      PORT: "${COLYSEUS_PORT:-2567}"
      COLYSEUS_ROOM_NAME: "${COLYSEUS_ROOM_NAME:-pirate_shooter_v2}"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_COLYSEUS_URL: "${VITE_COLYSEUS_URL:-}"
        VITE_COLYSEUS_HOST: "${COLYSEUS_WS_HOST:-localhost}"
        VITE_COLYSEUS_PORT: "${COLYSEUS_PORT:-2567}"
        VITE_COLYSEUS_ROOM_NAME: "${COLYSEUS_ROOM_NAME:-pirate_shooter_v2}"
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped
